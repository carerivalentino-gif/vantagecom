<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Invitación - Barrio Seguro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 mt-10">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Nueva Invitación</h1>
        <p class="text-slate-500 mb-6 text-sm">Ingresá los datos de tu visita para generar el acceso.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nombre del Invitado</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez" 
                    class="w-full p-4 bg-slate-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <button onclick="generar()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                GENERAR CÓDIGO QR
            </button>
        </div>

        <div id="qr-container" class="hidden mt-8 flex flex-col items-center border-t pt-8">
            <div id="qrcode" class="p-4 bg-white border-4 border-blue-50 rounded-2xl"></div>
            <p class="mt-4 text-blue-600 font-medium text-sm">Pase listo para enviar</p>
        </div>
    </div>

    <script>
        function generar() {
            const nombre = document.getElementById('nombre').value;
            if (!nombre) return alert("Poné un nombre che!");
            
            document.getElementById('qrcode').innerHTML = "";
            document.getElementById('qr-container').classList.remove('hidden');
            
            // Creamos un JSON simple para que el escáner lo lea prolijo
            const data = JSON.stringify({ n: nombre, t: Date.now() });
            
            new QRCode(document.getElementById("qrcode"), {
                text: data,
                width: 200,
                height: 200,
                colorDark : "#1e293b",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
    </script>
</body>
</html>
