<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Guardia</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    
    <div id="reader" class="w-full max-w-md overflow-hidden rounded-3xl bg-black shadow-2xl border-2 border-slate-700"></div>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
        <div id="modal-content" class="bg-white w-full max-w-sm rounded-[40px] p-10 text-center animate-bounce-short">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">AUTORIZADO</h2>
            <p id="nombre-invitado" class="text-xl text-slate-600 font-medium"></p>
            <button onclick="cerrarModal()" class="mt-8 w-full bg-slate-800 text-white py-4 rounded-2xl font-bold">CONTINUAR</button>
        </div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

        function onScanSuccess(decodedText) {
            try {
                const data = JSON.parse(decodedText);
                document.getElementById('nombre-invitado').innerText = data.n;
                document.getElementById('modal').classList.remove('hidden');
                // Sonido de éxito (opcional)
                window.navigator.vibrate(200);
            } catch (e) {
                console.error("QR no válido");
            }
        }

        function cerrarModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
    <style>
        #reader__dashboard { display: none !important; }
        video { object-fit: cover !important; }
    </style>
</body>
</html>
